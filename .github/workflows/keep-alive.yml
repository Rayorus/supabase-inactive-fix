name: Supabase Keep-Alive
on:
  schedule:
      - cron: '0 0 * * 1,4'
        workflow_dispatch:

        jobs:
          keep-alive:
              runs-on: ubuntu-latest
                  if: vars.ENABLE_GITHUB_ACTIONS == 'true'
                      steps:
                            - name: Checkout repository
                                    uses: actions/checkout@v4

                                          - name: Set up Python
                                                  uses: actions/setup-python@v5
                                                          with:
                                                                    python-version: '3.12'
                                                                              cache: 'pip'

                                                                                    - name: Install dependencies
                                                                                            run: pip install -r requirements.txt

                                                                                                  - name: Run keep-alive script
                                                                                                          run: python main.py
                                                                                                                  env:
                                                                                                                            SUPABASE_KEY_CODECONNECT: ${{ secrets.SUPABASE_KEY_CODECONNECT }}
                                                                                                                                      SUPABASE_KEY_MEMORA: ${{ secrets.SUPABASE_KEY_MEMORA }}
                                                                                                                                      
